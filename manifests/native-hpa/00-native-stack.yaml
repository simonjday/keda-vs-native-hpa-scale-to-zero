---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-native
  labels:
    demo: native-hpa-scale-to-zero

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-metrics
  namespace: demo-native
  labels:
    app: fake-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fake-metrics
  template:
    metadata:
      labels:
        app: fake-metrics
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: metrics
          image: python:3.12-alpine
          command: ["python3", "-c"]
          args:
            - |
              import http.server, threading, os
              queue_depth = float(os.environ.get("INITIAL_QUEUE_DEPTH", "10"))
              lock = threading.Lock()
              PORT = 8080
              ns  = os.environ.get("POD_NAMESPACE", "demo-native")
              pod = os.environ.get("POD_NAME", "fake-metrics")
              class H(http.server.BaseHTTPRequestHandler):
                  def log_message(self, *a): pass
                  def do_GET(self):
                      global queue_depth
                      if self.path == "/health":
                          self.send_response(200); self.end_headers(); self.wfile.write(b"ok")
                      elif self.path == "/metrics":
                          with lock: v = queue_depth
                          body = ("# HELP queue_depth_total Queue depth\n"
                                  "# TYPE queue_depth_total gauge\n"
                                  "queue_depth_total{namespace=\"%s\",pod=\"%s\"} %s\n" % (ns, pod, v))
                          b = body.encode()
                          self.send_response(200)
                          self.send_header("Content-Type", "text/plain; version=0.0.4")
                          self.send_header("Content-Length", str(len(b)))
                          self.end_headers(); self.wfile.write(b)
                      elif self.path.startswith("/set"):
                          from urllib.parse import urlparse, parse_qs
                          qs = parse_qs(urlparse(self.path).query)
                          with lock: queue_depth = float(qs["queue_depth"][0])
                          self.send_response(200); self.end_headers()
                          self.wfile.write(("ok %s" % queue_depth).encode())
                      else:
                          self.send_response(404); self.end_headers()
              http.server.ThreadingHTTPServer(("", PORT), H).serve_forever()
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef: {fieldPath: metadata.namespace}
            - name: POD_NAME
              valueFrom:
                fieldRef: {fieldPath: metadata.name}
            - name: INITIAL_QUEUE_DEPTH
              value: "10"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet: {path: /health, port: 8080}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: {cpu: 10m, memory: 32Mi}
            limits:   {cpu: 100m, memory: 64Mi}

---
apiVersion: v1
kind: Service
metadata:
  name: fake-metrics
  namespace: demo-native
  labels:
    app: fake-metrics
spec:
  selector:
    app: fake-metrics
  ports:
    - name: http
      port: 8080
      targetPort: 8080

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fake-metrics-native
  namespace: demo-native
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: fake-metrics
  namespaceSelector:
    matchNames:
      - demo-native
  endpoints:
    - port: http
      path: /metrics
      interval: 15s

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-app-hpa
  namespace: demo-native
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker-app
  minReplicas: 0
  maxReplicas: 10
  metrics:
    - type: External
      external:
        metric:
          name: queue_depth_external
          selector:
            matchLabels:
              namespace: demo-native
        target:
          type: Value
          value: "20"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 10
          periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 5
          periodSeconds: 15
